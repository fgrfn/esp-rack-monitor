substitutions:
  host_1_name: "UNRAID"
  host_2_name: "PROXMOX"
  host_3_name: "NAS"
  entity_rack_cost_today: sensor.esp_rack_monitor_cost_today
  entity_sun: sun.sun

time:
  - platform: homeassistant
    id: ha_time

sensor:
  # Power values
  - platform: homeassistant
    id: power_total
    entity_id: ${entity_power_total}
    unit_of_measurement: W
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: power_unraid
    entity_id: ${entity_power_unraid}
    unit_of_measurement: W
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: power_proxmox
    entity_id: ${entity_power_proxmox}
    unit_of_measurement: W
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: power_nas
    entity_id: ${entity_power_nas}
    unit_of_measurement: W
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: power_jetkvm_modem
    entity_id: ${entity_power_jetkvm_modem}
    unit_of_measurement: W
    filters:
      - timeout: ${sensor_stale_timeout}

  # Temperatures
  - platform: homeassistant
    id: temp_rack
    entity_id: ${entity_temp_rack}
    unit_of_measurement: °C
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: temp_unraid
    entity_id: ${entity_temp_unraid}
    unit_of_measurement: °C
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: temp_proxmox
    entity_id: ${entity_temp_proxmox}
    unit_of_measurement: °C
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: temp_nas
    entity_id: ${entity_temp_nas}
    unit_of_measurement: °C
    filters:
      - timeout: ${sensor_stale_timeout}

  # CPU, RAM and disk utilization
  - platform: homeassistant
    id: cpu_unraid
    entity_id: ${entity_cpu_unraid}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: ram_unraid
    entity_id: ${entity_ram_unraid}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: disk_unraid
    entity_id: ${entity_disk_unraid}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: cpu_proxmox
    entity_id: ${entity_cpu_proxmox}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: ram_proxmox
    entity_id: ${entity_ram_proxmox}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: disk_proxmox
    entity_id: ${entity_disk_proxmox}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: cpu_nas
    entity_id: ${entity_cpu_nas}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: ram_nas
    entity_id: ${entity_ram_nas}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: disk_nas
    entity_id: ${entity_disk_nas}
    unit_of_measurement: "%"
    filters:
      - timeout: ${sensor_stale_timeout}

  # Electricity price, energy and actual daily cost
  - platform: homeassistant
    id: electricity_price
    entity_id: ${entity_electricity_price}
    filters:
      - timeout: ${sensor_stale_timeout}

  - platform: homeassistant
    id: rack_energy_today
    entity_id: ${entity_rack_energy_today}
    unit_of_measurement: kWh
    filters:
      - timeout: 2h

  - platform: homeassistant
    id: rack_cost_today_actual
    entity_id: ${entity_rack_cost_today}
    unit_of_measurement: "€"
    filters:
      - timeout: 2h

  # Optional heartbeat. If it has never existed, the monitor remains backward compatible.
  - platform: homeassistant
    id: data_heartbeat
    entity_id: ${entity_heartbeat}
    filters:
      - timeout: ${heartbeat_timeout}
    on_value:
      then:
        - lambda: |-
            if (std::isfinite(x)) id(heartbeat_seen) = true;

  # Local diagnostics
  - platform: wifi_signal
    id: wifi_rssi
    name: "${friendly_name} WLAN Signal"
    update_interval: 60s

  - platform: uptime
    id: device_uptime
    name: "${friendly_name} Uptime"
    type: seconds
    update_interval: 60s

  - platform: debug
    free:
      id: heap_free
      name: "${friendly_name} Heap Free"
    psram:
      id: psram_free
      name: "${friendly_name} PSRAM Free"
    loop_time:
      id: loop_time
      name: "${friendly_name} Loop Time"

  # Calculated cost sensors
  - platform: template
    id: rack_cost_hour
    name: "${friendly_name} Kosten pro Stunde"
    unit_of_measurement: "€/h"
    accuracy_decimals: 4
    update_interval: 15s
    lambda: |-
      if (!rack_monitor::valid(id(power_total).state) || !rack_monitor::valid(id(electricity_price).state)) return NAN;
      return (id(power_total).state / 1000.0f) * (id(electricity_price).state / ${electricity_price_divisor});

  - platform: template
    id: rack_cost_day
    name: "${friendly_name} Kosten pro Tag Hochrechnung"
    unit_of_measurement: "€/d"
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      if (!rack_monitor::valid(id(rack_cost_hour).state)) return NAN;
      return id(rack_cost_hour).state * 24.0f;

  - platform: template
    id: rack_cost_month
    name: "${friendly_name} Kosten pro Monat Hochrechnung"
    unit_of_measurement: "€/Monat"
    accuracy_decimals: 2
    update_interval: 15s
    lambda: |-
      if (!rack_monitor::valid(id(rack_cost_hour).state)) return NAN;
      return id(rack_cost_hour).state * 24.0f * 30.0f;

  - platform: template
    id: alarm_count
    name: "${friendly_name} Aktive Alarme"
    icon: mdi:alarm-light
    accuracy_decimals: 0
    update_interval: 2s
    lambda: return rack_monitor::count_bits(id(active_alarm_mask));

  - platform: template
    id: warning_count
    name: "${friendly_name} Aktive Warnungen"
    icon: mdi:alert-outline
    accuracy_decimals: 0
    update_interval: 2s
    lambda: return rack_monitor::count_bits(id(warning_mask));

  - platform: template
    id: data_age_seconds
    name: "${friendly_name} Datenalter"
    unit_of_measurement: s
    icon: mdi:timer-sand
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (!rack_monitor::valid(id(data_heartbeat).state)) return NAN;
      const auto now = id(ha_time).now();
      if (!now.is_valid()) return NAN;
      return std::max(0.0f, static_cast<float>(now.timestamp) - id(data_heartbeat).state);

binary_sensor:
  - platform: status
    id: api_status
    name: "${friendly_name} Status"

  - platform: homeassistant
    id: unraid_online
    entity_id: ${entity_unraid_online}

  - platform: homeassistant
    id: proxmox_online
    entity_id: ${entity_proxmox_online}

  - platform: homeassistant
    id: nas_online
    entity_id: ${entity_nas_online}

  - platform: template
    id: alarm_active
    name: "${friendly_name} Kritischer Alarm"
    device_class: problem
    lambda: return id(active_alarm_mask) != 0;

  - platform: template
    id: warning_active
    name: "${friendly_name} Warnung"
    device_class: problem
    lambda: return id(warning_mask) != 0;

  - platform: template
    id: alarm_unacknowledged
    name: "${friendly_name} Alarm nicht quittiert"
    device_class: problem
    lambda: return (id(active_alarm_mask) & ~id(acknowledged_alarm_mask)) != 0;

  - platform: template
    id: configuration_mismatch
    name: "${friendly_name} Versionskonflikt"
    device_class: problem
    lambda: return (id(warning_mask) & rack_monitor::WARNING_CONFIG_MISMATCH) != 0;
    entity_category: diagnostic

text_sensor:
  - platform: homeassistant
    id: sun_state
    entity_id: ${entity_sun}
    on_value:
      then:
        - script.execute: apply_backlight

  - platform: wifi_info
    ip_address:
      id: device_ip
      name: "${friendly_name} IP-Adresse"
    ssid:
      id: connected_ssid
      name: "${friendly_name} WLAN"

  - platform: debug
    reset_reason:
      id: reset_reason
      name: "${friendly_name} Reset-Grund"

  - platform: version
    id: esphome_version
    name: "${friendly_name} ESPHome-Version"
    hide_timestamp: true

  - platform: template
    id: alarm_reason
    name: "${friendly_name} Alarmgründe"
    icon: mdi:alarm-light
    update_interval: 2s
    lambda: |-
      return {rack_monitor::mask_reasons(id(active_alarm_mask), "${host_1_name}", "${host_2_name}", "${host_3_name}")};

  - platform: template
    id: alarm_primary_reason
    name: "${friendly_name} Hauptalarm"
    icon: mdi:alert-decagram
    update_interval: 2s
    lambda: |-
      return {rack_monitor::primary_reason(id(active_alarm_mask), "${host_1_name}", "${host_2_name}", "${host_3_name}")};

  - platform: template
    id: warning_reason
    name: "${friendly_name} Warnungsgründe"
    icon: mdi:alert-outline
    update_interval: 2s
    lambda: |-
      return {rack_monitor::mask_reasons(id(warning_mask), "${host_1_name}", "${host_2_name}", "${host_3_name}")};

  - platform: template
    id: configuration_ref
    name: "${friendly_name} Update-Ref"
    icon: mdi:source-branch
    update_interval: never
    lambda: return {"${rack_monitor_library_ref}"};
    entity_category: diagnostic

  - platform: template
    id: project_version_text
    name: "${friendly_name} Projektversion"
    icon: mdi:tag-outline
    update_interval: never
    lambda: return {"${project_version}"};
    entity_category: diagnostic
