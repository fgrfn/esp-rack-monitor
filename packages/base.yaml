esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Rack monitoring display for LilyGO T-Display-S3"
  min_version: 2026.6.0
  project:
    name: "fgrfn.esp_rack_monitor"
    version: ${project_version}
  includes:
    - <rack_monitor_helpers.h>
  libraries:
    - "RackMonitorHelpers=https://github.com/fgrfn/esp-rack-monitor.git#${rack_monitor_library_ref}"
  on_boot:
    - priority: -100
      then:
        - delay: 2s
        - script.execute: initialize_runtime
        - component.update: main_display

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

debug:
  update_interval: 60s
