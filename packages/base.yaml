esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Rack monitoring display for LilyGO T-Display-S3"
  min_version: 2026.6.0
  project:
    name: "fgrfn.esp_rack_monitor"
    version: ${project_version}
  includes:
    - <rack_monitor_helpers.h>
  libraries:
    # The versioned dependency name deliberately changes with releases. PlatformIO
    # otherwise reuses an older Git checkout when the source still points to main.
    - "${rack_monitor_helper_package}=https://github.com/fgrfn/esp-rack-monitor.git#${rack_monitor_library_ref}"
  on_boot:
    - priority: -100
      then:
        - delay: 2s
        - script.execute: initialize_runtime
        - component.update: main_display

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # The ESP32-S3 uses an 800 ms interrupt watchdog when PSRAM is enabled.
      # Allow a little more headroom for simultaneous Wi-Fi and octal-display work,
      # while still resetting the device promptly if a core genuinely locks up.
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "1200"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

debug:
  update_interval: 60s
