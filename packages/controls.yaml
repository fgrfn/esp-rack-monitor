substitutions:
  host_1_name: "UNRAID"
  host_2_name: "PROXMOX"
  host_3_name: "NAS"
  host_4_name: "JETKVM+MODEM"
  rotation_interval_seconds: "12"
  manual_rotation_pause_seconds: "60"
  day_brightness_default: "100"
  night_brightness_default: "12"
  night_start_hour_default: "23"
  night_end_hour_default: "7"
  boot_grace_seconds: "60"
  alarm_trigger_delay_seconds: "20"
  alarm_clear_delay_seconds: "60"
  temp_hysteresis_default: "2"
  power_hysteresis_default: "15"
  utilization_hysteresis_default: "5"
  entity_rack_cost_today: sensor.esp_rack_monitor_cost_today
  entity_sun: sun.sun
  power_graph_y_grid: "25"
  temp_graph_y_grid: "5"

globals:
  - id: current_page
    type: int
    restore_value: true
    initial_value: "0"

  - id: heartbeat_seen
    type: bool
    restore_value: false
    initial_value: "false"

  - id: active_alarm_mask
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: warning_mask
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: acknowledged_alarm_mask
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: alarm_page_forced
    type: bool
    restore_value: false
    initial_value: "false"

  - id: last_rotation_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: rotation_pause_until_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: alarm_test_until_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

