select:
  - platform: template
    id: page_select
    name: "${friendly_name} Seite"
    icon: mdi:view-dashboard-outline
    optimistic: true
    restore_value: false
    initial_option: "Übersicht"
    options:
      - "Übersicht"
      - "Strom"
      - "Temperaturen"
      - "Systeme"
      - "Trends"
      - "Kosten"
      - "Diagnose"
      - "Test"
    set_action:
      - lambda: |-
          if (x == "Übersicht") id(current_page) = 0;
          else if (x == "Strom") id(current_page) = 1;
          else if (x == "Temperaturen") id(current_page) = 2;
          else if (x == "Systeme") id(current_page) = 3;
          else if (x == "Trends") id(current_page) = 4;
          else if (x == "Kosten") id(current_page) = 5;
          else if (x == "Diagnose") id(current_page) = 6;
          else id(current_page) = 7;
      - script.execute: pause_rotation
      - script.execute: show_current_page
      - script.execute: wake_display

  - platform: template
    id: default_page_select
    name: "${friendly_name} Startseite"
    icon: mdi:home-outline
    optimistic: true
    restore_value: true
    initial_option: "Übersicht"
    options:
      - "Übersicht"
      - "Strom"
      - "Temperaturen"
      - "Systeme"
      - "Trends"
      - "Kosten"
      - "Diagnose"
    entity_category: config

button:
  - platform: template
    id: acknowledge_alarm_button
    name: "${friendly_name} Alarm quittieren"
    icon: mdi:check-decagram-outline
    on_press:
      - lambda: |-
          id(acknowledged_alarm_mask) = id(active_alarm_mask);
          id(alarm_page_forced) = false;
      - script.execute: show_current_page
      - script.execute: wake_display

  - platform: template
    id: test_alarm_button
    name: "${friendly_name} Alarm testen"
    icon: mdi:alarm-light-outline
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(alarm_test_until_ms) = millis() + 60000UL;
          id(acknowledged_alarm_mask) &= ~rack_monitor::ALARM_TEST;
      - script.execute: wake_display

  - platform: restart
    name: "${friendly_name} Neustart"

  - platform: safe_mode
    name: "${friendly_name} Sicherer Modus"

script:
  - id: initialize_runtime
    mode: restart
    then:
      - lambda: |-
          if (!id(restore_last_page_switch).state) {
            const std::string page = id(default_page_select).state;
            if (page == "Strom") id(current_page) = 1;
            else if (page == "Temperaturen") id(current_page) = 2;
            else if (page == "Systeme") id(current_page) = 3;
            else if (page == "Trends") id(current_page) = 4;
            else if (page == "Kosten") id(current_page) = 5;
            else if (page == "Diagnose") id(current_page) = 6;
            else id(current_page) = 0;
          }
          id(last_rotation_ms) = millis();
      - script.execute: show_current_page
      - script.execute: apply_backlight

  - id: show_current_page
    mode: restart
    then:
      - lambda: |-
          int page = id(current_page) % 8;
          if (page < 0) page += 8;
          id(current_page) = page;
          switch (page) {
            case 0:
              id(main_display).show_page(id(page_overview));
              id(page_select).publish_state("Übersicht");
              break;
            case 1:
              id(main_display).show_page(id(page_power));
              id(page_select).publish_state("Strom");
              break;
            case 2:
              id(main_display).show_page(id(page_temps));
              id(page_select).publish_state("Temperaturen");
              break;
            case 3:
              id(main_display).show_page(id(page_compute));
              id(page_select).publish_state("Systeme");
              break;
            case 4:
              id(main_display).show_page(id(page_trends));
              id(page_select).publish_state("Trends");
              break;
            case 5:
              id(main_display).show_page(id(page_costs));
              id(page_select).publish_state("Kosten");
              break;
            case 6:
              id(main_display).show_page(id(page_diagnostics));
              id(page_select).publish_state("Diagnose");
              break;
            default:
              id(main_display).show_page(id(page_test));
              id(page_select).publish_state("Test");
              break;
          }
      - component.update: main_display

  - id: pause_rotation
    mode: restart
    then:
      - lambda: |-
          const uint32_t pause_ms = static_cast<uint32_t>(id(manual_pause_setting).state * 1000.0f);
          id(rotation_pause_until_ms) = pause_ms == 0 ? 0 : millis() + pause_ms;
          id(last_rotation_ms) = millis();

  - id: apply_backlight
    mode: restart
    then:
      - lambda: |-
          float brightness = id(day_brightness_setting).state / 100.0f;
          const auto now = id(ha_time).now();
          const bool sun_night = id(sun_based_night_mode_switch).state &&
                                 id(sun_state).state == "below_horizon";
          const bool clock_night = now.is_valid() &&
                                   rack_monitor::in_night_window(now.hour,
                                                               static_cast<int>(id(night_start_setting).state),
                                                               static_cast<int>(id(night_end_setting).state));
          if (id(night_mode_switch).state && (sun_night || (!id(sun_based_night_mode_switch).state && clock_night))) {
            brightness = id(night_brightness_setting).state / 100.0f;
          }
          if (brightness <= 0.0f) {
            id(display_backlight).turn_off().perform();
          } else {
            auto call = id(display_backlight).turn_on();
            call.set_brightness(std::clamp(brightness, 0.0f, 1.0f));
            call.perform();
          }

  - id: wake_display
    mode: restart
    then:
      - lambda: |-
          auto call = id(display_backlight).turn_on();
          call.set_brightness(std::clamp(id(day_brightness_setting).state / 100.0f, 0.05f, 1.0f));
          call.perform();
      - delay: ${wake_duration}
      - script.execute: apply_backlight

interval:
  - interval: 1s
    then:
      - lambda: |-
          const uint32_t now = millis();
          uint32_t raw_alarm = 0;
          uint32_t raw_warning = 0;
          const uint32_t active_before = id(active_alarm_mask);
          const bool grace_finished = (now / 1000UL) >= static_cast<uint32_t>(id(boot_grace_setting).state);

          const auto critical = [&](float value, float limit, float hysteresis, uint32_t bit) {
            if (!rack_monitor::valid(value)) return false;
            const float effective = (active_before & bit) ? std::max(0.0f, limit - hysteresis) : limit;
            return value >= effective;
          };
          const auto warning = [&](float value, float limit) {
            return rack_monitor::valid(value) && value >= limit;
          };

          if (grace_finished && id(alarm_connection_enabled).state) {
            if (!id(api_status).state) raw_alarm |= rack_monitor::ALARM_API_OFFLINE;
            if (id(heartbeat_seen) && !rack_monitor::valid(id(data_heartbeat).state))
              raw_alarm |= rack_monitor::ALARM_DATA_STALE;
          }

          if (grace_finished && id(alarm_host_offline_enabled).state) {
            if (id(host_1_enabled).state && id(unraid_online).has_state() && !id(unraid_online).state)
              raw_alarm |= rack_monitor::ALARM_HOST1_OFFLINE;
            if (id(host_2_enabled).state && id(proxmox_online).has_state() && !id(proxmox_online).state)
              raw_alarm |= rack_monitor::ALARM_HOST2_OFFLINE;
            if (id(host_3_enabled).state && id(nas_online).has_state() && !id(nas_online).state)
              raw_alarm |= rack_monitor::ALARM_HOST3_OFFLINE;
          }

          if (id(alarm_power_enabled).state) {
            if (critical(id(power_total).state, id(rack_power_critical_setting).state,
                         id(power_hysteresis_setting).state, rack_monitor::ALARM_POWER_TOTAL))
              raw_alarm |= rack_monitor::ALARM_POWER_TOTAL;
            if (warning(id(power_total).state, id(rack_power_warn_setting).state))
              raw_warning |= rack_monitor::ALARM_POWER_TOTAL;
          }

          if (id(alarm_temperature_enabled).state) {
            if (critical(id(temp_rack).state, id(rack_temp_critical_setting).state,
                         id(temp_hysteresis_setting).state, rack_monitor::ALARM_TEMP_RACK))
              raw_alarm |= rack_monitor::ALARM_TEMP_RACK;
            if (warning(id(temp_rack).state, id(rack_temp_warn_setting).state))
              raw_warning |= rack_monitor::ALARM_TEMP_RACK;

            if (id(host_1_enabled).state) {
              if (critical(id(temp_unraid).state, id(host_temp_critical_setting).state,
                           id(temp_hysteresis_setting).state, rack_monitor::ALARM_TEMP_HOST1))
                raw_alarm |= rack_monitor::ALARM_TEMP_HOST1;
              if (warning(id(temp_unraid).state, id(host_temp_warn_setting).state))
                raw_warning |= rack_monitor::ALARM_TEMP_HOST1;
            }
            if (id(host_2_enabled).state) {
              if (critical(id(temp_proxmox).state, id(host_temp_critical_setting).state,
                           id(temp_hysteresis_setting).state, rack_monitor::ALARM_TEMP_HOST2))
                raw_alarm |= rack_monitor::ALARM_TEMP_HOST2;
              if (warning(id(temp_proxmox).state, id(host_temp_warn_setting).state))
                raw_warning |= rack_monitor::ALARM_TEMP_HOST2;
            }
            if (id(host_3_enabled).state) {
              if (critical(id(temp_nas).state, id(nas_temp_critical_setting).state,
                           id(temp_hysteresis_setting).state, rack_monitor::ALARM_TEMP_HOST3))
                raw_alarm |= rack_monitor::ALARM_TEMP_HOST3;
              if (warning(id(temp_nas).state, id(nas_temp_warn_setting).state))
                raw_warning |= rack_monitor::ALARM_TEMP_HOST3;
            }
          }

          if (id(alarm_utilization_enabled).state) {
            const float util_h = id(utilization_hysteresis_setting).state;
            if (id(host_1_enabled).state) {
              if (critical(id(cpu_unraid).state, id(cpu_critical_setting).state, util_h, rack_monitor::ALARM_CPU_HOST1))
                raw_alarm |= rack_monitor::ALARM_CPU_HOST1;
              if (warning(id(cpu_unraid).state, id(cpu_warn_setting).state))
                raw_warning |= rack_monitor::ALARM_CPU_HOST1;
            }
            if (id(host_2_enabled).state) {
              if (critical(id(cpu_proxmox).state, id(cpu_critical_setting).state, util_h, rack_monitor::ALARM_CPU_HOST2))
                raw_alarm |= rack_monitor::ALARM_CPU_HOST2;
              if (warning(id(cpu_proxmox).state, id(cpu_warn_setting).state))
                raw_warning |= rack_monitor::ALARM_CPU_HOST2;
            }
            if (id(host_3_enabled).state) {
              if (critical(id(cpu_nas).state, id(cpu_critical_setting).state, util_h, rack_monitor::ALARM_CPU_HOST3))
                raw_alarm |= rack_monitor::ALARM_CPU_HOST3;
              if (warning(id(cpu_nas).state, id(cpu_warn_setting).state))
                raw_warning |= rack_monitor::ALARM_CPU_HOST3;
            }

            const bool ram_critical =
              (id(host_1_enabled).state && critical(id(ram_unraid).state, id(ram_critical_setting).state, util_h, rack_monitor::ALARM_RAM_ANY)) ||
              (id(host_2_enabled).state && critical(id(ram_proxmox).state, id(ram_critical_setting).state, util_h, rack_monitor::ALARM_RAM_ANY)) ||
              (id(host_3_enabled).state && critical(id(ram_nas).state, id(ram_critical_setting).state, util_h, rack_monitor::ALARM_RAM_ANY));
            const bool ram_warning =
              (id(host_1_enabled).state && warning(id(ram_unraid).state, id(ram_warn_setting).state)) ||
              (id(host_2_enabled).state && warning(id(ram_proxmox).state, id(ram_warn_setting).state)) ||
              (id(host_3_enabled).state && warning(id(ram_nas).state, id(ram_warn_setting).state));
            if (ram_critical) raw_alarm |= rack_monitor::ALARM_RAM_ANY;
            if (ram_warning) raw_warning |= rack_monitor::ALARM_RAM_ANY;

            const bool disk_critical =
              (id(host_1_enabled).state && critical(id(disk_unraid).state, id(disk_critical_setting).state, util_h, rack_monitor::ALARM_DISK_ANY)) ||
              (id(host_2_enabled).state && critical(id(disk_proxmox).state, id(disk_critical_setting).state, util_h, rack_monitor::ALARM_DISK_ANY)) ||
              (id(host_3_enabled).state && critical(id(disk_nas).state, id(disk_critical_setting).state, util_h, rack_monitor::ALARM_DISK_ANY));
            const bool disk_warning =
              (id(host_1_enabled).state && warning(id(disk_unraid).state, id(disk_warn_setting).state)) ||
              (id(host_2_enabled).state && warning(id(disk_proxmox).state, id(disk_warn_setting).state)) ||
              (id(host_3_enabled).state && warning(id(disk_nas).state, id(disk_warn_setting).state));
            if (disk_critical) raw_alarm |= rack_monitor::ALARM_DISK_ANY;
            if (disk_warning) raw_warning |= rack_monitor::ALARM_DISK_ANY;
          }

          if (rack_monitor::before_deadline(now, id(alarm_test_until_ms)))
            raw_alarm |= rack_monitor::ALARM_TEST;

          const std::string configured_ref = "${rack_monitor_library_ref}";
          const std::string expected_ref = "v${project_version}";
          if (configured_ref != "main" && configured_ref != "beta" && configured_ref != expected_ref)
            raw_warning |= rack_monitor::WARNING_CONFIG_MISMATCH;

          raw_warning |= raw_alarm;

          static uint32_t pending_since[17] = {};
          static uint32_t clearing_since[17] = {};
          uint32_t active = active_before;
          const uint32_t trigger_ms = static_cast<uint32_t>(id(alarm_trigger_delay_setting).state * 1000.0f);
          const uint32_t clear_ms = static_cast<uint32_t>(id(alarm_clear_delay_setting).state * 1000.0f);

          for (int i = 0; i < 17; ++i) {
            const uint32_t bit = 1u << i;
            const bool raw = (raw_alarm & bit) != 0;
            const bool is_active = (active & bit) != 0;
            const uint32_t bit_trigger_ms = bit == rack_monitor::ALARM_TEST ? 0 : trigger_ms;
            const uint32_t bit_clear_ms = bit == rack_monitor::ALARM_TEST ? 0 : clear_ms;

            if (raw) {
              clearing_since[i] = 0;
              if (!is_active) {
                if (pending_since[i] == 0) pending_since[i] = now == 0 ? 1 : now;
                if (bit_trigger_ms == 0 || rack_monitor::elapsed(now, pending_since[i], bit_trigger_ms)) {
                  active |= bit;
                  pending_since[i] = 0;
                }
              }
            } else {
              pending_since[i] = 0;
              if (is_active) {
                if (clearing_since[i] == 0) clearing_since[i] = now == 0 ? 1 : now;
                if (bit_clear_ms == 0 || rack_monitor::elapsed(now, clearing_since[i], bit_clear_ms)) {
                  active &= ~bit;
                  clearing_since[i] = 0;
                }
              }
            }
          }

          const uint32_t gained = active & ~active_before;
          id(active_alarm_mask) = active;
          id(warning_mask) = raw_warning & ~active;
          id(acknowledged_alarm_mask) &= active;

          if (gained != 0) {
            id(alarm_page_forced) = true;
            id(wake_display).execute();
          }
          if (active == 0) {
            id(alarm_page_forced) = false;
            id(acknowledged_alarm_mask) = 0;
          }

          const uint32_t unacknowledged = active & ~id(acknowledged_alarm_mask);
          if (unacknowledged != 0) {
            id(alarm_page_forced) = true;
            id(main_display).show_page(id(page_alarm));
          } else if (id(alarm_page_forced)) {
            id(alarm_page_forced) = false;
            id(show_current_page).execute();
          }

          if (active != active_before || gained != 0)
            id(main_display).update();

          const bool paused = rack_monitor::before_deadline(now, id(rotation_pause_until_ms));
          if (id(auto_rotate_switch).state && !paused && unacknowledged == 0) {
            const uint32_t interval_ms = static_cast<uint32_t>(id(rotation_interval_setting).state * 1000.0f);
            if (interval_ms > 0 && static_cast<uint32_t>(now - id(last_rotation_ms)) >= interval_ms) {
              const auto page_available = [&](int page) {
                if (!id(skip_empty_pages_switch).state) return true;
                if (page == 1)
                  return (id(host_1_enabled).state && rack_monitor::valid(id(power_unraid).state)) ||
                         (id(host_2_enabled).state && rack_monitor::valid(id(power_proxmox).state)) ||
                         (id(host_3_enabled).state && rack_monitor::valid(id(power_nas).state)) ||
                         (id(host_4_enabled).state && rack_monitor::valid(id(power_jetkvm_modem).state));
                if (page == 2)
                  return rack_monitor::valid(id(temp_rack).state) ||
                         (id(host_1_enabled).state && rack_monitor::valid(id(temp_unraid).state)) ||
                         (id(host_2_enabled).state && rack_monitor::valid(id(temp_proxmox).state)) ||
                         (id(host_3_enabled).state && rack_monitor::valid(id(temp_nas).state));
                if (page == 3)
                  return (id(host_1_enabled).state && (rack_monitor::valid(id(cpu_unraid).state) || rack_monitor::valid(id(ram_unraid).state) || rack_monitor::valid(id(disk_unraid).state))) ||
                         (id(host_2_enabled).state && (rack_monitor::valid(id(cpu_proxmox).state) || rack_monitor::valid(id(ram_proxmox).state) || rack_monitor::valid(id(disk_proxmox).state))) ||
                         (id(host_3_enabled).state && (rack_monitor::valid(id(cpu_nas).state) || rack_monitor::valid(id(ram_nas).state) || rack_monitor::valid(id(disk_nas).state)));
                if (page == 4)
                  return rack_monitor::valid(id(power_total).state) || rack_monitor::valid(id(temp_rack).state);
                if (page == 5)
                  return rack_monitor::valid(id(electricity_price).state) ||
                         rack_monitor::valid(id(rack_cost_hour).state) ||
                         rack_monitor::valid(id(rack_cost_today_actual).state);
                return true;
              };

              int next = id(current_page);
              for (int attempt = 0; attempt < 7; ++attempt) {
                next = (next + 1) % 7;
                if (page_available(next)) break;
              }
              id(current_page) = next;
              id(last_rotation_ms) = now;
              id(show_current_page).execute();
            }
          }

  - interval: 60s
    then:
      - script.execute: apply_backlight

binary_sensor:
  - platform: gpio
    id: button_next
    name: "${friendly_name} Taste Weiter"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_click:
      - min_length: 50ms
        max_length: 600ms
        then:
          - script.execute: wake_display
          - script.execute: pause_rotation
          - if:
              condition:
                lambda: return (id(active_alarm_mask) & ~id(acknowledged_alarm_mask)) == 0;
              then:
                - lambda: |-
                    int next = id(current_page);
                    for (int attempt = 0; attempt < 8; ++attempt) {
                      next = (next + 1) % 8;
                      if (!id(skip_empty_pages_switch).state || next == 0 || next == 6 || next == 7) break;
                      if (next == 1 && ((id(host_1_enabled).state && rack_monitor::valid(id(power_unraid).state)) ||
                                        (id(host_2_enabled).state && rack_monitor::valid(id(power_proxmox).state)) ||
                                        (id(host_3_enabled).state && rack_monitor::valid(id(power_nas).state)) ||
                                        (id(host_4_enabled).state && rack_monitor::valid(id(power_jetkvm_modem).state)))) break;
                      if (next == 2 && (rack_monitor::valid(id(temp_rack).state) ||
                                        (id(host_1_enabled).state && rack_monitor::valid(id(temp_unraid).state)) ||
                                        (id(host_2_enabled).state && rack_monitor::valid(id(temp_proxmox).state)) ||
                                        (id(host_3_enabled).state && rack_monitor::valid(id(temp_nas).state)))) break;
                      if (next == 3 && ((id(host_1_enabled).state && rack_monitor::valid(id(cpu_unraid).state)) ||
                                        (id(host_2_enabled).state && rack_monitor::valid(id(cpu_proxmox).state)) ||
                                        (id(host_3_enabled).state && rack_monitor::valid(id(cpu_nas).state)))) break;
                      if (next == 4 && (rack_monitor::valid(id(power_total).state) || rack_monitor::valid(id(temp_rack).state))) break;
                      if (next == 5 && (rack_monitor::valid(id(electricity_price).state) || rack_monitor::valid(id(rack_cost_hour).state))) break;
                    }
                    id(current_page) = next;
                - script.execute: show_current_page
      - min_length: 800ms
        max_length: 10s
        then:
          - script.execute: wake_display
          - script.execute: pause_rotation
          - if:
              condition:
                lambda: return (id(active_alarm_mask) & ~id(acknowledged_alarm_mask)) == 0;
              then:
                - lambda: id(current_page) = (id(current_page) + 7) % 8;
                - script.execute: show_current_page

  - platform: gpio
    id: button_auto
    name: "${friendly_name} Taste Auto"
    pin:
      number: GPIO14
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_click:
      - min_length: 50ms
        max_length: 700ms
        then:
          - script.execute: wake_display
          - script.execute: pause_rotation
          - if:
              condition:
                lambda: return id(active_alarm_mask) == 0;
              then:
                - switch.toggle: auto_rotate_switch
                - component.update: main_display
    on_multi_click:
      - timing:
          - ON for at least 800ms
        then:
          - logger.log: "B2 long press: acknowledge alarm"
          - script.execute: wake_display
          - button.press: acknowledge_alarm_button
