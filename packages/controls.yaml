globals:
  - id: current_page
    type: int
    restore_value: false
    initial_value: "0"

  - id: heartbeat_seen
    type: bool
    restore_value: false
    initial_value: "false"

  - id: alarm_acknowledged
    type: bool
    restore_value: false
    initial_value: "false"

  - id: alarm_page_forced
    type: bool
    restore_value: false
    initial_value: "false"

switch:
  - platform: template
    id: auto_rotate_switch
    name: "${friendly_name} Auto-Rotation"
    icon: mdi:rotate-3d-variant
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: night_mode_switch
    name: "${friendly_name} Automatischer Nachtmodus"
    icon: mdi:weather-night
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - script.execute: apply_backlight
    turn_off_action:
      - script.execute: apply_backlight

select:
  - platform: template
    id: page_select
    name: "${friendly_name} Seite"
    icon: mdi:view-dashboard-outline
    optimistic: true
    restore_value: false
    initial_option: "Übersicht"
    options:
      - "Übersicht"
      - "Strom"
      - "Temperaturen"
      - "Systeme"
      - "Trends"
      - "Kosten"
      - "Diagnose"
    set_action:
      - lambda: |-
          if (x == "Übersicht") id(current_page) = 0;
          else if (x == "Strom") id(current_page) = 1;
          else if (x == "Temperaturen") id(current_page) = 2;
          else if (x == "Systeme") id(current_page) = 3;
          else if (x == "Trends") id(current_page) = 4;
          else if (x == "Kosten") id(current_page) = 5;
          else if (x == "Diagnose") id(current_page) = 6;
      - script.execute: show_current_page
      - script.execute: wake_display

button:
  - platform: template
    id: acknowledge_alarm_button
    name: "${friendly_name} Alarm quittieren"
    icon: mdi:check-decagram-outline
    on_press:
      - lambda: |-
          id(alarm_acknowledged) = true;
          id(alarm_page_forced) = false;
      - script.execute: show_current_page
      - script.execute: wake_display

  - platform: restart
    name: "${friendly_name} Neustart"

  - platform: safe_mode
    name: "${friendly_name} Sicherer Modus"

script:
  - id: show_current_page
    mode: restart
    then:
      - lambda: |-
          int page = id(current_page) % 7;
          if (page < 0) page += 7;
          id(current_page) = page;
          switch (page) {
            case 0:
              id(main_display).show_page(id(page_overview));
              id(page_select).publish_state("Übersicht");
              break;
            case 1:
              id(main_display).show_page(id(page_power));
              id(page_select).publish_state("Strom");
              break;
            case 2:
              id(main_display).show_page(id(page_temps));
              id(page_select).publish_state("Temperaturen");
              break;
            case 3:
              id(main_display).show_page(id(page_compute));
              id(page_select).publish_state("Systeme");
              break;
            case 4:
              id(main_display).show_page(id(page_trends));
              id(page_select).publish_state("Trends");
              break;
            case 5:
              id(main_display).show_page(id(page_costs));
              id(page_select).publish_state("Kosten");
              break;
            default:
              id(main_display).show_page(id(page_diagnostics));
              id(page_select).publish_state("Diagnose");
              break;
          }
      - component.update: main_display

  - id: apply_backlight
    mode: restart
    then:
      - lambda: |-
          float brightness = ${day_brightness} / 100.0f;
          const auto now = id(ha_time).now();
          if (id(night_mode_switch).state && now.is_valid() &&
              rack_monitor::in_night_window(now.hour, ${night_start_hour}, ${night_end_hour})) {
            brightness = ${night_brightness} / 100.0f;
          }
          if (brightness <= 0.0f) {
            id(display_backlight).turn_off().perform();
          } else {
            auto call = id(display_backlight).turn_on();
            call.set_brightness(brightness);
            call.perform();
          }

  - id: wake_display
    mode: restart
    then:
      - lambda: |-
          auto call = id(display_backlight).turn_on();
          call.set_brightness(${day_brightness} / 100.0f);
          call.perform();
      - delay: ${wake_duration}
      - script.execute: apply_backlight

interval:
  - interval: ${rotation_interval}
    then:
      - if:
          condition:
            lambda: |-
              return id(auto_rotate_switch).state && (!id(alarm_active).state || id(alarm_acknowledged));
          then:
            - lambda: |-
                id(current_page) = (id(current_page) + 1) % 7;
            - script.execute: show_current_page

  - interval: 2s
    then:
      - lambda: |-
          if (!id(alarm_active).state) {
            if (id(alarm_page_forced)) {
              id(alarm_page_forced) = false;
              id(show_current_page).execute();
            }
            id(alarm_acknowledged) = false;
            return;
          }
          if (!id(alarm_acknowledged)) {
            id(alarm_page_forced) = true;
            id(main_display).show_page(id(page_alarm));
            id(main_display).update();
          }

  - interval: 60s
    then:
      - script.execute: apply_backlight

binary_sensor:
  - platform: gpio
    id: button_next
    name: "${friendly_name} Taste Weiter"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_click:
      - min_length: 50ms
        max_length: 600ms
        then:
          - script.execute: wake_display
          - if:
              condition:
                lambda: return !id(alarm_active).state || id(alarm_acknowledged);
              then:
                - lambda: id(current_page) = (id(current_page) + 1) % 7;
                - script.execute: show_current_page
      - min_length: 800ms
        max_length: 3s
        then:
          - script.execute: wake_display
          - if:
              condition:
                lambda: return !id(alarm_active).state || id(alarm_acknowledged);
              then:
                - lambda: id(current_page) = (id(current_page) + 6) % 7;
                - script.execute: show_current_page

  - platform: gpio
    id: button_auto
    name: "${friendly_name} Taste Auto"
    pin:
      number: GPIO14
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_click:
      - min_length: 50ms
        max_length: 600ms
        then:
          - script.execute: wake_display
          - switch.toggle: auto_rotate_switch
          - component.update: main_display
      - min_length: 800ms
        max_length: 3s
        then:
          - button.press: acknowledge_alarm_button
