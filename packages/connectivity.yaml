wifi:
  ssid: "${wifi_ssid_value}"
  password: "${wifi_password_value}"
  power_save_mode: none
  reboot_timeout: 15min
  ap:
    ssid: "Rack-Display Fallback"
    password: "${fallback_ap_password_value}"

captive_portal:

api:
  encryption:
    key: "${api_encryption_key_value}"

ota:
  - platform: esphome
    password: "${ota_password_value}"

web_server:
  port: 80
  version: 3
  local: true
  ota: false
  auth:
    username: "${web_server_username_value}"
    password: "${web_server_password_value}"
