name: Source release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: source-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ESPHOME_VERSION: "2026.6.4"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create ephemeral validation secrets
        shell: bash
        run: bash .github/scripts/create-ci-secrets.sh

      - name: Compile tagged source
        uses: esphome/build-action@v7
        with:
          yaml-file: esp-rack-monitor.yaml
          version: ${{ env.ESPHOME_VERSION }}

  release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create source release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes \
            --title "ESP Rack Monitor ${GITHUB_REF_NAME}"
