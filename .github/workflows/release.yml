name: Firmware release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release secrets
        shell: bash
        run: |
          cat > configs/secrets.yaml <<'SECRETS'
          wifi_ssid: "configure-after-flash"
          wifi_password: "configure-after-flash"
          fallback_ap_password: "change-this-fallback-password"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "change-this-ota-password"
          web_server_username: "rackmonitor"
          web_server_password: "change-this-web-password"
          SECRETS

      - name: Compile firmware
        id: esphome-build
        uses: esphome/build-action@v7
        with:
          yaml-file: configs/esp-rack-monitor.yaml
          version: latest
          release-summary: "ESP Rack Monitor ${{ github.ref_name }}"
          release-url: "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          complete-manifest: true

      - name: Create release and upload firmware
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" --generate-notes --title "ESP Rack Monitor ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" "${{ steps.esphome-build.outputs.name }}"/* --clobber
