name: ESPHome latest compatibility

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esphome-latest-compatibility
  cancel-in-progress: true

jobs:
  build-latest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create ephemeral CI secrets
        shell: bash
        run: bash .github/scripts/create-ci-secrets.sh

      - name: Compile with latest ESPHome
        uses: esphome/build-action@v7
        with:
          yaml-file: configs/esp-rack-monitor.yaml
          version: latest
