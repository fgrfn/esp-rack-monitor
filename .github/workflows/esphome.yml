name: ESPHome build

on:
  push:
    branches:
      - main
    paths:
      - "esp-rack-monitor.yaml"
      - "packages/**"
      - "src/**"
      - "library.json"
      - "secrets.example.yaml"
      - ".github/scripts/**"
      - ".github/workflows/esphome.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esphome-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ESPHOME_VERSION: "2026.6.4"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create ephemeral CI secrets
        shell: bash
        run: bash .github/scripts/create-ci-secrets.sh

      - name: Point remote packages to tested ref
        shell: bash
        run: bash .github/scripts/prepare-remote-ref.sh "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

      - name: Compile firmware
        shell: bash
        run: |
          set -o pipefail
          docker run --rm \
            -v "${PWD}:/config" \
            -w /config \
            "ghcr.io/esphome/esphome:${ESPHOME_VERSION}" \
            compile esp-rack-monitor.yaml 2>&1 | tee esphome-build.log

      - name: Stage firmware artifacts
        if: success()
        shell: bash
        run: |
          docker run --rm \
            -v "${PWD}:/config" \
            --entrypoint /bin/sh \
            "ghcr.io/esphome/esphome:${ESPHOME_VERSION}" \
            -c '
              set -eu
              mkdir -p /config/build-artifacts
              find /config/.esphome/build -type f \
                \( -name "firmware.bin" -o -name "firmware.ota.bin" -o -name "firmware.factory.bin" \) \
                -exec cp -v "{}" /config/build-artifacts/ \;
              test -n "$(find /config/build-artifacts -type f -name "*.bin" -print -quit)"
              chmod -R a+rX /config/build-artifacts
            '

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: esp-rack-monitor-build-log
          path: esphome-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: esp-rack-monitor-firmware
          path: build-artifacts/
          if-no-files-found: error
          retention-days: 7
