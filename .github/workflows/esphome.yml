name: ESPHome build

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create CI secrets
        shell: bash
        run: |
          cat > configs/secrets.yaml <<'SECRETS'
          wifi_ssid: "ci-network"
          wifi_password: "ci-password-1234"
          fallback_ap_password: "ci-fallback-password"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci-ota-password"
          web_server_username: "ci-user"
          web_server_password: "ci-web-password"
          SECRETS

      - name: Compile firmware
        id: esphome-build
        uses: esphome/build-action@v7
        with:
          yaml-file: configs/esp-rack-monitor.yaml
          version: latest

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.esphome-build.outputs.name }}
          path: ${{ steps.esphome-build.outputs.name }}
          if-no-files-found: error
